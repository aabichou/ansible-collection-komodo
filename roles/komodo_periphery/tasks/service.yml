---
- name: Template Periphery systemd service unit
  ansible.builtin.template:
    src: periphery.service.j2
    dest: /etc/systemd/system/periphery.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd daemon
    - Restart periphery service

- name: Enable and start Periphery service
  ansible.builtin.systemd:
    name: periphery
    state: started
    enabled: true
    daemon_reload: true

- name: Verify Periphery service is running
  ansible.builtin.systemd:
    name: periphery
  register: _periphery_service_state
  failed_when: _periphery_service_state.status.ActiveState != 'active'
